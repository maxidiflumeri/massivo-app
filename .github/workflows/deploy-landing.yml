name: deploy-landing

on:
  push:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::811261691778:role/massivo-prod-github-actions
  S3_BUCKET: massivo-prod-landing-811261691778
  CF_DISTRIBUTION_ID: EYO1OVL0SGSKM
  VITE_PANEL_URL: https://panel.massivo.app
  VITE_CLERK_PUBLISHABLE_KEY: pk_test_ZmxleGlibGUtZm94aG91bmQtNjMuY2xlcmsuYWNjb3VudHMuZGV2JA
  VITE_ENABLE_DEV_SIMULATOR: 'false'
  VITE_WAPI_BOT_FEATURE_ENABLED: 'true'

jobs:
  build-and-deploy:
    name: Build → S3 sync → CloudFront invalidate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build landing
        run: pnpm --filter @massivo/landing exec vite build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync assets (cacheables, immutable)
        run: |
          aws s3 sync apps/landing/dist/ "s3://${S3_BUCKET}/" \
            --delete \
            --exclude "*.html" --exclude "asset-manifest.json" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync HTML (no-cache)
        run: |
          aws s3 sync apps/landing/dist/ "s3://${S3_BUCKET}/" \
            --exclude "*" --include "*.html" --include "asset-manifest.json" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CF_DISTRIBUTION_ID}" \
            --paths "/*" \
            --query 'Invalidation.Id' --output text
