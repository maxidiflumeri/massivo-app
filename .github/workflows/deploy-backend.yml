name: deploy-backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - 'infra/docker-compose.yml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  id-token: write   # OIDC trust con AWS
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: massivo-prod-backend
  EC2_INSTANCE_ID: i-04f54928d8c12d964
  AWS_ROLE_ARN: arn:aws:iam::811261691778:role/massivo-prod-github-actions

jobs:
  build-and-deploy:
    name: Build (linux/arm64) → push → SSM deploy
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          SHA_TAG="${{ github.sha }}"
          echo "image_sha=${REGISTRY}/${ECR_REPOSITORY}:${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${REGISTRY}/${ECR_REPOSITORY}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.tags.outputs.image_sha }}
            ${{ steps.tags.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2 via SSM
        env:
          IMAGE_SHA: ${{ steps.tags.outputs.image_sha }}
        run: |
          # Pipeline inline: git pull (sincroniza compose/scripts) + login ECR
          # + docker compose pull + up -d. Sin depender de que el script
          # `deploy-backend-on-ec2.sh` ya esté en la EC2 (primera corrida).
          REMOTE_SCRIPT=$(cat <<'EOSH'
          set -euo pipefail
          cd /opt/massivo/app
          git pull --ff-only origin main || echo "WARN: git pull no fast-forward"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text --region $AWS_REGION)
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin "${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          docker compose -f infra/docker-compose.yml pull api
          docker compose -f infra/docker-compose.yml up -d api
          docker image prune -f
          docker compose -f infra/docker-compose.yml ps
          EOSH
          )
          # Las env vars que necesita el script
          REMOTE_SCRIPT="export AWS_REGION=${AWS_REGION}; export BACKEND_IMAGE='${IMAGE_SHA}'; ${REMOTE_SCRIPT}"
          # JSON-escape para SSM
          ESCAPED=$(printf '%s' "$REMOTE_SCRIPT" | jq -Rs .)

          CMD_ID=$(aws ssm send-command \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${IMAGE_SHA}" \
            --parameters "commands=[${ESCAPED}]" \
            --output text --query 'Command.CommandId')
          echo "SSM CommandId: $CMD_ID"

          # Espera activamente hasta que el comando termine (con timeout).
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${EC2_INSTANCE_ID}" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "[$i/60] status=$STATUS"
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut)
                echo "::error::SSM command status: $STATUS"
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id "${EC2_INSTANCE_ID}" \
                  --query '[StandardOutputContent,StandardErrorContent]' --output text
                exit 1
                ;;
            esac
            sleep 5
          done

          echo "=== SSM output ==="
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query 'StandardOutputContent' --output text

      - name: Smoke test API
        run: |
          # Espera a que el container esté healthy (curl al health vía Nginx)
          for i in $(seq 1 30); do
            if curl -sf https://api.massivo.app/api/health > /dev/null; then
              echo "API healthy ✅"
              exit 0
            fi
            echo "[$i/30] waiting for /api/health..."
            sleep 5
          done
          echo "::error::API no respondió healthy tras 150s"
          exit 1
