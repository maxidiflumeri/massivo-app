name: deploy-backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - 'infra/docker-compose.yml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target a desplegar'
        type: choice
        options: [massivo, rgbot]
        default: massivo

permissions:
  id-token: write   # OIDC trust con AWS
  contents: read

jobs:
  build-and-deploy:
    name: Build (linux/arm64) → push → SSM deploy
    runs-on: ubuntu-24.04-arm
    # El environment (massivo-prod / rgbot-prod) provee las coordenadas AWS (vars).
    # Push a main → massivo; "Run workflow" → el target elegido.
    environment: ${{ github.event.inputs.target || 'massivo' }}-prod
    env:
      TARGET: ${{ github.event.inputs.target || 'massivo' }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      ECR_REPOSITORY: ${{ vars.BACKEND_ECR_REPOSITORY }}
      EC2_INSTANCE_ID: ${{ vars.BACKEND_EC2_INSTANCE_ID }}
      API_URL: ${{ vars.API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          SHA_TAG="${{ github.sha }}"
          echo "image_sha=${REGISTRY}/${ECR_REPOSITORY}:${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${REGISTRY}/${ECR_REPOSITORY}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.tags.outputs.image_sha }}
            ${{ steps.tags.outputs.image_latest }}
          # cache-from/to deshabilitados temporalmente: el cache de GHA con
          # buildx reusaba layers de COPY de versiones anteriores y nos
          # entregaba imágenes con código viejo (incluso cuando los archivos
          # fuente cambiaban). Builds son más lentos (~15 min vs 5-8) pero
          # confiables. Reactivar cuando migremos a registry cache
          # (type=registry,ref=<ecr>:cache).

      - name: Deploy to EC2 via SSM
        env:
          IMAGE_SHA: ${{ steps.tags.outputs.image_sha }}
        run: |
          # Construimos el script bash que correrá en la EC2 y lo
          # base64-encodeamos. Bypass total de escapes de newlines / quotes /
          # special chars al pasar por la API de SSM (que usa /bin/sh, no bash).
          REMOTE_SCRIPT=$(cat <<EOSH
          #!/usr/bin/env bash
          set -euo pipefail
          export AWS_REGION=${AWS_REGION}
          export BACKEND_IMAGE="${IMAGE_SHA}"
          # SSM corre como root pero el repo es de ubuntu — usamos
          # sudo -u ubuntu -H para que git vea su ownership correctamente
          # y HOME apunte al de ubuntu (sino git config se rompe).
          # reset --hard + clean -fd para no fallar ante mods locales o
          # archivos untracked que pudieron quedar de debug manual previo.
          cd /opt/massivo/app
          sudo -u ubuntu -H git fetch origin main
          sudo -u ubuntu -H git reset --hard origin/main
          sudo -u ubuntu -H git clean -fd
          ACCOUNT_ID=\$(aws sts get-caller-identity --query Account --output text --region "\$AWS_REGION")
          aws ecr get-login-password --region "\$AWS_REGION" | \
            docker login --username AWS --password-stdin "\${ACCOUNT_ID}.dkr.ecr.\${AWS_REGION}.amazonaws.com"
          # ===== Limpieza PRE-pull =====
          # Antes hacíamos prune después del pull → si el disco de 20GB estaba
          # arriba del 85% el pull (~2.6GB) lo llenaba y el SSM agent crasheaba
          # con "ipc messaging received timeout signal" (OOM/buffer write fail).
          # Ahora liberamos espacio primero. La imagen en uso por el container
          # corriendo está protegida (Docker no la borra), así que el rollback
          # rápido sigue disponible hasta que el up -d traiga la nueva.
          echo "=== disk PRE-cleanup ==="
          df -h /
          docker system df || true
          docker image prune -a -f || true
          docker builder prune -a -f || true
          echo "=== disk POST-cleanup ==="
          df -h /
          docker compose -f infra/docker-compose.yml pull api
          docker compose -f infra/docker-compose.yml up -d api
          # ===== Limpieza POST-up =====
          # La imagen vieja quedó sin container que la use; la barremos pero
          # respetamos until=24h para mantener una para rollback manual si
          # algo en la nueva versión sale mal (docker tag <prev-sha> + up).
          docker image prune -a -f --filter "until=24h" || true
          docker builder prune -a -f --filter "until=72h" || true
          echo "=== disk FINAL ==="
          df -h /
          docker compose -f infra/docker-compose.yml ps
          EOSH
          )
          SCRIPT_B64=$(echo "$REMOTE_SCRIPT" | base64 -w0)
          SHORT_SHA="${GITHUB_SHA:0:7}"
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy backend ${SHORT_SHA}" \
            --parameters "commands=[\"echo ${SCRIPT_B64} | base64 -d | bash\"]" \
            --output text --query 'Command.CommandId')
          echo "SSM CommandId: $CMD_ID"

          # Espera activamente hasta que el comando termine (con timeout).
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${EC2_INSTANCE_ID}" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "[$i/60] status=$STATUS"
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut)
                echo "::error::SSM command status: $STATUS"
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id "${EC2_INSTANCE_ID}" \
                  --query '[StandardOutputContent,StandardErrorContent]' --output text
                exit 1
                ;;
            esac
            sleep 5
          done

          echo "=== SSM output ==="
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query 'StandardOutputContent' --output text

      - name: Smoke test API
        run: |
          # Espera a que el container esté healthy (curl al health vía Nginx)
          for i in $(seq 1 30); do
            if curl -sf "${API_URL}/api/health" > /dev/null; then
              echo "API healthy ✅"
              exit 0
            fi
            echo "[$i/30] waiting for /api/health..."
            sleep 5
          done
          echo "::error::API no respondió healthy tras 150s"
          exit 1
