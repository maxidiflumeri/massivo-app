name: deploy-docs

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::811261691778:role/massivo-prod-github-actions
  S3_BUCKET: massivo-prod-docs-811261691778
  CF_DISTRIBUTION_ID: E21L5EETRDCVUX

jobs:
  build-and-deploy:
    name: Build → S3 sync → CloudFront invalidate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter @massivo/docs build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Docusaurus genera HTML para cada ruta + assets versionados con hash.
      # Igual que landing: assets immutable, HTML must-revalidate.
      - name: Sync assets (cacheables, immutable)
        run: |
          aws s3 sync apps/docs/build/ "s3://${S3_BUCKET}/" \
            --delete \
            --exclude "*.html" --exclude "*.xml" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync HTML + sitemap (no-cache)
        run: |
          aws s3 sync apps/docs/build/ "s3://${S3_BUCKET}/" \
            --exclude "*" --include "*.html" --include "*.xml" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CF_DISTRIBUTION_ID}" \
            --paths "/*" \
            --query 'Invalidation.Id' --output text
