name: deploy-docs

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target a desplegar'
        type: choice
        options: [massivo, rgbot]
        default: massivo

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build → S3 sync → CloudFront invalidate
    runs-on: ubuntu-24.04
    environment: ${{ github.event.inputs.target || 'massivo' }}-prod
    env:
      TARGET: ${{ github.event.inputs.target || 'massivo' }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      S3_BUCKET: ${{ vars.DOCS_S3_BUCKET }}
      CF_DISTRIBUTION_ID: ${{ vars.DOCS_CF_DISTRIBUTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # NOTA: docusaurus.config.ts todavía tiene el dominio massivo hardcodeado.
      # El branding de docs por target queda como follow-up (Eje 3 — docs).
      - name: Build docs
        run: pnpm --filter @massivo/docs build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync assets (cacheables, immutable)
        run: |
          aws s3 sync apps/docs/build/ "s3://${S3_BUCKET}/" \
            --delete \
            --exclude "*.html" --exclude "*.xml" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync HTML + sitemap (no-cache)
        run: |
          aws s3 sync apps/docs/build/ "s3://${S3_BUCKET}/" \
            --exclude "*" --include "*.html" --include "*.xml" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CF_DISTRIBUTION_ID}" \
            --paths "/*" \
            --query 'Invalidation.Id' --output text
