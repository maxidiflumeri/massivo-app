<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%VITE_BRAND_FAVICON%" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="%VITE_BRAND_PRIMARY%" />
    <!-- %VITE_*% los reemplaza Vite en el build según el target (.env.<mode> de la raíz) -->
    <title>%VITE_APP_NAME% — Conversaciones que generan ventas. WhatsApp + Email en un solo lugar.</title>
    <meta
      name="description"
      content="Plataforma multi-canal para empresas que quieren automatizar WhatsApp Business y email marketing sin atarse a herramientas hechas a parche."
    />
    <meta property="og:title" content="%VITE_APP_NAME% — WhatsApp + Email automation para empresas LATAM" />
    <meta
      property="og:description"
      content="Bots, inbox unificado, campañas de email y WhatsApp Business API oficial. Todo desde una sola plataforma."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://%VITE_DOMAIN_ROOT%" />
  </head>
  <!-- El widget de webchat se inyecta en runtime desde main.tsx solo si el target define VITE_WEBCHAT_KEY -->
  <body class="bg-neutral-950 text-neutral-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
