# docker-compose para correr massivo-app en la EC2.
#
# Ubicación esperada: <repo-root>/infra/docker-compose.yml
# El .env de producción vive en <repo-root>/.env (gitignored).
#
# Modo CI/CD (default en EC2): la imagen viene de ECR vía BACKEND_IMAGE.
#   docker compose -f infra/docker-compose.yml pull
#   docker compose -f infra/docker-compose.yml up -d
#
# Modo dev local: dejá BACKEND_IMAGE vacío y descomentá el `build:`.
#   docker compose -f infra/docker-compose.yml up -d --build

services:
  api:
    image: ${BACKEND_IMAGE:-massivo-backend:latest}
    # Para buildear local en lugar de pullear, descomentar:
    # build:
    #   context: ..
    #   dockerfile: apps/backend/Dockerfile
    container_name: massivo-api
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: "3001"
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: massivo-redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Visor de logs vía web (logs.massivo.app).
  # Lee el socket de Docker read-only y stream logs por WebSocket — sin DB,
  # sin persistencia (lo que aguante el log driver json-file de cada container).
  # Sin auth propia: nginx hace basic_auth antes de proxear (htpasswd en EC2).
  # Bound a 127.0.0.1:8888 para que solo nginx pueda alcanzarlo.
  dozzle:
    image: amir20/dozzle:v8
    container_name: massivo-dozzle
    environment:
      DOZZLE_NO_ANALYTICS: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:8888:8080"
    restart: unless-stopped
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  redis-data:
    name: massivo-redis-data

networks:
  internal:
    name: massivo-internal
