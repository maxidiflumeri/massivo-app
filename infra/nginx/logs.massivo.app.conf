# Reverse proxy de logs.massivo.app -> Dozzle en 127.0.0.1:8888.
# Auth básica de nginx para no exponer la UI públicamente; el container de
# Dozzle no tiene auth propia.
#
# Ubicación en EC2: /etc/nginx/sites-enabled/logs.massivo.app.conf
# Tracking en el repo: infra/nginx/logs.massivo.app.conf (para IaC / fácil rehacer).
#
# Versión INICIAL HTTP-only — el primer `sudo certbot --nginx -d logs.massivo.app`
# agrega in-place: listen 443 ssl, ssl_certificate, y un server block 80 → 301.
# Después de certbot, no editar a mano (lo maneja certbot en renovaciones).

server {
    server_name logs.massivo.app;

    # Webroot para validaciones http-01 de certbot
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    auth_basic "Massivo Logs";
    auth_basic_user_file /etc/nginx/.htpasswd-logs;

    location / {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;

        # Dozzle stream logs vía WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts largos para que el tail no se corte
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Sin buffering para que el stream llegue en tiempo real
        proxy_buffering off;
    }

    listen 80;
    listen [::]:80;
}
