# Reverse proxy de api.massivo.app -> backend NestJS en 127.0.0.1:3001.
#
# Esta es la versión INICIAL HTTP-only. El primer `certbot --nginx`
# la modifica in-place agregando: listen 443 ssl, ssl_certificate,
# y un server block adicional 80 -> 301 a https.
#
# Después de certbot, no editar este archivo a mano (lo gestiona certbot
# durante las renovaciones).

server {
    listen 80;
    listen [::]:80;
    server_name api.massivo.app;

    # Webroot para validaciones http-01 si certbot corre standalone
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Tamaño máximo de body (uploads de media WhatsApp / email templates)
    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket upgrade (Socket.io del módulo inbox)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers para el backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts largos para WS / SSE / long polling
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;

        # Streaming sin buffering (para SSE y subidas grandes)
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Health del propio nginx, útil para chequeos externos
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
